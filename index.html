<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Filtering App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Product Search</h1>

        <input
            type="text"
            id="searchInput"
            placeholder="Search for a product..."
        >

        <div class="buttons">
            <button onclick="filterCategory('All')">All</button>
            <button onclick="filterCategory('Electronics')">Electronics</button>
            <button onclick="filterCategory('Footwear')">Footwear</button>
            <button onclick="filterCategory('Accessories')">Accessories</button>
            <button onclick="filterCategory('Wearables')">Wearables</button>
        </div>

        <p id="productCount"></p>

        <div id="productList"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
